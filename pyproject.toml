[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.coverage.run]
source = ["app"]
omit = [
    "app/ml/*",            # excluded: real inference requires torch/insightface weights, see NFR-42 note in README
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
]

[tool.ruff]
line-length = 110
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
# B008: FastAPI's Depends()-as-default-argument is the documented,
# idiomatic pattern for the framework — not a real mutable-default bug.
ignore = ["B008"]
